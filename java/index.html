<!DOCTYPE html>
<html>
<head>
<title>Secure Grievance System</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f2f2;
    display:flex;
    flex-wrap: wrap;
}

.sidebar{
    width:220px;
    background:#1e2a38;
    color:white;
    height:100vh;
    padding:20px;
}
.sidebar h2{
    font-size:18px;
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
}

.main{
    flex:1;
    padding:20px;
    min-width:300px;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cards{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap: wrap;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    flex:1;
    min-width:150px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    border-collapse:collapse;
    overflow:hidden;
}
th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:5px 8px;
    cursor:pointer;
    border-radius:5px;
    margin:2px;
}
button:hover{
    background:#2980b9;
}

.newbtn{
    position:fixed;
    right:30px;
    bottom:30px;
    padding:15px 20px;
    font-size:14px;
    border-radius:30px;
    background:#2ecc71;
}
.newbtn:hover{
    background:#27ae60;
}

.formbox{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,textarea,select{
    width:95%;
    padding:8px;
    margin-top:5px;
}

.captcha{
    background:#eee;
    padding:10px;
    display:inline-block;
    font-weight:bold;
    letter-spacing:4px;
    font-size:20px;
    margin-top:10px;
}

@media(max-width:768px){
    body{
        flex-direction: column;
    }
    .sidebar{
        width:100%;
        height:auto;
    }
    .cards{
        flex-direction: column;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Secure Grievance System</h2>
    <a href="#">Overview</a>
    <a href="#">Submit Grievance</a>
    <a href="#">My Grievances</a>
    <a href="#">Track Status</a>
    <a href="#">Settings</a>
</div>

<div class="main">
    <div class="header">
        <h2>Dashboard</h2>
        <p id="username">Citizen</p>
    </div>
    <h3 id="welcome">Welcome back!</h3>

    <div class="cards">
        <div class="card total">
            <h3>Total Grievances</h3>
            <p id="total">0</p>
        </div>
        <div class="card review">
            <h3>Under Review</h3>
            <p id="review">0</p>
        </div>
        <div class="card resolved">
            <h3>Resolved</h3>
            <p id="resolved">0</p>
        </div>
    </div>

    <div class="formbox">
        <h3>Submit Complaint</h3>
        <input type="text" id="name" placeholder="Your Name"><br><br>
        <input type="text" id="issue" placeholder="Issue Title"><br><br>
        <select id="category">
            <option value="General">General</option>
            <option value="Water">Water</option>
            <option value="Electricity">Electricity</option>
            <option value="Roads">Roads</option>
        </select><br><br>
        <textarea id="desc" placeholder="Describe problem"></textarea><br><br>
        <div>Enter Captcha:<div class="captcha" id="captchaText"></div></div>
        <input type="text" id="captchaInput" placeholder="Type captcha here"><br><br>
        <button onclick="addComplaint()">Submit</button>
    </div>

    <div class="formbox">
        <h3>Filter / Search Complaints</h3>
        <select id="filterStatus">
            <option value="All">All Status</option>
            <option value="Under Review">Under Review</option>
            <option value="Resolved">Resolved</option>
        </select>
        <select id="filterCategory">
            <option value="All">All Categories</option>
            <option value="General">General</option>
            <option value="Water">Water</option>
            <option value="Electricity">Electricity</option>
            <option value="Roads">Roads</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search by Name or Issue">
        <button onclick="applyFilter()">Apply Filter</button>
        <button onclick="resetFilter()">Reset</button>
    </div>

    <h3>My Grievances</h3>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Issue</th>
                <th>Category</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<button class="newbtn" onclick="scrollToForm()">+ File New Grievance</button>

<script>
let complaints=[];
let captchaValue="";

function generateCaptcha(){
    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    captchaValue="";
    for(let i=0;i<5;i++){
        captchaValue+=chars[Math.floor(Math.random()*chars.length)];
    }
    document.getElementById("captchaText").innerText=captchaValue;
}

function saveComplaints(){
    localStorage.setItem("complaints", JSON.stringify(complaints));
}
function loadComplaints(){
    let saved = localStorage.getItem("complaints");
    if(saved){
        complaints = JSON.parse(saved);
        updateTable();
    }
}

function addComplaint(){
    let name=document.getElementById("name").value;
    let issue=document.getElementById("issue").value;
    let category=document.getElementById("category").value;
    let desc=document.getElementById("desc").value;
    let captcha=document.getElementById("captchaInput").value;

    if(name=="" || issue=="" || desc==""){
        alert("Please fill all fields");
        return;
    }
    if(captcha!==captchaValue){
        alert("Captcha incorrect!");
        generateCaptcha();
        return;
    }

    let status="Under Review";
    complaints.push({name,issue,category,desc,status});
    saveComplaints();

    document.getElementById("username").innerText=name;
    document.getElementById("welcome").innerText="Welcome back, "+name+"!";

    updateTable();

    document.getElementById("name").value="";
    document.getElementById("issue").value="";
    document.getElementById("desc").value="";
    document.getElementById("captchaInput").value="";
    generateCaptcha();
}

function resolve(index){
    complaints[index].status="Resolved";
    saveComplaints();
    updateTable();
}

function deleteComplaint(index){
    complaints.splice(index,1);
    saveComplaints();
    updateTable();
}

function edit(index){
    document.getElementById("name").value = complaints[index].name;
    document.getElementById("issue").value = complaints[index].issue;
    document.getElementById("category").value = complaints[index].category;
    document.getElementById("desc").value = complaints[index].desc;
    complaints.splice(index,1);
    saveComplaints();
    updateTable();
}

function scrollToForm(){
    window.scrollTo({top:300,behavior:"smooth"});
}

function updateTable(data){
    let display = data || complaints;
    let body=document.getElementById("tableBody");
    body.innerHTML="";
    display.forEach((c)=>{
        let index = complaints.indexOf(c);
        body.innerHTML += `<tr>
            <td>${c.name}</td>
            <td>${c.issue}</td>
            <td>${c.category}</td>
            <td>${c.status}</td>
            <td>
                <button onclick="resolve(${index})">Resolve</button>
                <button onclick="edit(${index})">Edit</button>
                <button onclick="deleteComplaint(${index})">Delete</button>
            </td>
        </tr>`;
    });
    document.getElementById("total").innerText = complaints.length;
    document.getElementById("review").innerText = complaints.filter(c=>c.status=="Under Review").length;
    document.getElementById("resolved").innerText = complaints.filter(c=>c.status=="Resolved").length;
}

function applyFilter(){
    let statusFilter = document.getElementById("filterStatus").value;
    let categoryFilter = document.getElementById("filterCategory").value;
    let searchText = document.getElementById("searchInput").value.toLowerCase();

    let filtered = complaints.filter(c => {
        let statusMatch = (statusFilter=="All") || (c.status==statusFilter);
        let categoryMatch = (categoryFilter=="All") || (c.category==categoryFilter);
        let searchMatch = c.name.toLowerCase().includes(searchText) || c.issue.toLowerCase().includes(searchText);
        return statusMatch && categoryMatch && searchMatch;
    });

    updateTable(filtered);
}

function resetFilter(){
    document.getElementById("filterStatus").value = "All";
    document.getElementById("filterCategory").value = "All";
    document.getElementById("searchInput").value = "";
    updateTable();
}

window.onload = function(){
    loadComplaints();
    generateCaptcha();
}
</script>

</body>
</html>
