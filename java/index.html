<!DOCTYPE html><html>
<head>
<title>Secure Grievance System</title><style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
background:#1e2a38;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
font-size:18px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

/* Main */

.main{
flex:1;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.total{background:#ffffff;}
.review{background:#fff4d6;}
.resolved{background:#d4f8e8;}

/* Table */

table{
width:100%;
margin-top:20px;
background:white;
border-radius:10px;
border-collapse:collapse;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

/* Buttons */

button{
background:#3498db;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

/* Floating Button */

.newbtn{
position:fixed;
right:30px;
bottom:30px;
padding:15px 20px;
font-size:14px;
border-radius:30px;
background:#2ecc71;
}

.newbtn:hover{
background:#27ae60;
}

/* Form */

.formbox{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:95%;
padding:8px;
margin-top:5px;
}

/* Captcha */

.captcha{
background:#eee;
padding:10px;
display:inline-block;
font-weight:bold;
letter-spacing:4px;
font-size:20px;
margin-top:10px;
}

</style></head><body><!-- Sidebar --><div class="sidebar"><h2>Secure Grievance System</h2><a href="#">Overview</a>
<a href="#">Submit Grievance</a>
<a href="#">My Grievances</a>
<a href="#">Track Status</a>
<a href="#">Settings</a>

</div><!-- Main --><div class="main"><div class="header">
<h2>Dashboard</h2>
<p id="username">Citizen</p>
</div><h3 id="welcome">Welcome back!</h3><!-- Cards --><div class="cards"><div class="card total">
<h3>Total Grievances</h3>
<p id="total">0</p>
</div><div class="card review">
<h3>Under Review</h3>
<p id="review">0</p>
</div><div class="card resolved">
<h3>Resolved</h3>
<p id="resolved">0</p>
</div></div><!-- Complaint Form --><div class="formbox"><h3>Submit Complaint</h3><input type="text" id="name" placeholder="Your Name"><br><br>

<input type="text" id="issue" placeholder="Issue Title"><br><br>

<textarea id="desc" placeholder="Describe problem"></textarea><br><br><div>
Enter Captcha:
<div class="captcha" id="captchaText"></div>
</div><input type="text" id="captchaInput" placeholder="Type captcha here"><br><br>

<button onclick="addComplaint()">Submit</button>

</div><!-- Table --><h3>My Grievances</h3><table><thead>
<tr>
<th>Name</th>
<th>Issue</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead><tbody id="tableBody"></tbody></table></div><!-- Floating Button --><button class="newbtn" onclick="scrollToForm()">+ File New Grievance</button>

<script>

let complaints=[];
let captchaValue="";

/* Generate captcha */

function generateCaptcha(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
captchaValue="";

for(let i=0;i<5;i++){
captchaValue+=chars[Math.floor(Math.random()*chars.length)];
}

document.getElementById("captchaText").innerText=captchaValue;

}

generateCaptcha();

/* Add complaint */

function addComplaint(){

let name=document.getElementById("name").value;
let issue=document.getElementById("issue").value;
let desc=document.getElementById("desc").value;
let captcha=document.getElementById("captchaInput").value;

/* empty check */

if(name=="" || issue=="" || desc==""){
alert("Please fill all fields");
return;
}

/* captcha check */

if(captcha!==captchaValue){
alert("Captcha incorrect!");
generateCaptcha();
return;
}

let status="Under Review";

complaints.push({name,issue,desc,status});

/* update username */

document.getElementById("username").innerText=name;
document.getElementById("welcome").innerText="Welcome back, "+name+"!";

/* update table */

updateTable();

/* reset form */

document.getElementById("name").value="";
document.getElementById("issue").value="";
document.getElementById("desc").value="";
document.getElementById("captchaInput").value="";

generateCaptcha();

}

/* Resolve complaint */

function resolve(index){

complaints[index].status="Resolved";

updateTable();

}

/* Update table */

function updateTable(){

let body=document.getElementById("tableBody");
body.innerHTML="";

let total=complaints.length;
let review=0;
let resolved=0;

complaints.forEach((c,i)=>{

if(c.status=="Under Review") review++;
if(c.status=="Resolved") resolved++;

let row=`
<tr>
<td>${c.name}</td>
<td>${c.issue}</td>
<td>${c.status}</td>
<td><button onclick="resolve(${i})">Resolve</button></td>
</tr>
`;

body.innerHTML+=row;

});

document.getElementById("total").innerText=total;
document.getElementById("review").innerText=review;
document.getElementById("resolved").innerText=resolved;

}

/* Scroll button */

function scrollToForm(){

window.scrollTo({
top:300,
behavior:"smooth"
});

}

</script></body>
</html>
