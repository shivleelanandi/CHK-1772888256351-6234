<!DOCTYPE html>

<html>
<head>

<title>Smart Grievance Redressal System</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#1e2a38;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#34495e;
padding:10px;
text-align:center;
}

nav button{
margin:5px;
padding:10px 15px;
border:none;
background:#1abc9c;
color:white;
cursor:pointer;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button.submit{
background:#2ecc71;
color:white;
border:none;
padding:10px;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#ecf0f1;
}

.resolved{
color:green;
font-weight:bold;
}

.pending{
color:red;
font-weight:bold;
}

.flag{
color:orange;
font-weight:bold;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<h2>Smart Grievance Redressal & Escalation System</h2>

</header>

<nav>

<button onclick="showUser()">User Panel</button>

<button onclick="showAuthority()">Authority Panel</button>

<button onclick="logout()">Logout</button>

</nav>

<div class="container">

<div id="loginSection" class="card">

<h3>Login</h3>

<label>Username</label>

<input type="text" id="username">

<label>Password</label>

<input type="password" id="password">

<select id="role">

<option value="user">User</option>

<option value="authority">Authority</option>

</select>

<button class="submit" onclick="login()">Login</button>

</div>

<div id="userPanel" class="hidden">

<div class="card">

<h3>Register Complaint</h3>

<label>Name</label> <input id="name">

<label>Email</label> <input id="email">

<label>Department</label>

<select id="dept">
<option>Electricity</option>
<option>Water</option>
<option>Road</option>
<option>Garbage</option>
</select>

<label>Complaint</label>

<textarea id="complaint"></textarea>

<label>Upload Evidence</label>

<input type="file">

<div>

<span id="captcha"></span>

<input id="captchaInput" placeholder="Enter captcha">

</div>

<button class="submit" onclick="submitComplaint()">Submit Complaint</button>

</div>

<div class="card">

<h3>My Complaints</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Department</th>
<th>Complaint</th>
<th>Status</th>
<th>SLA</th>
<th>Escalation</th>
</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<div id="authorityPanel" class="hidden">

<div class="card">

<h3>All Complaints (Authority)</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Complaint</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="adminTable"></tbody>

</table>

</div>

</div>

</div>

<script>

let complaints = JSON.parse(localStorage.getItem("complaints")) || []

let captchaCode = Math.floor(Math.random()*9000+1000)

document.getElementById("captcha").innerHTML="Captcha: "+captchaCode

function login(){

let role=document.getElementById("role").value

document.getElementById("loginSection").style.display="none"

if(role=="user"){
showUser()
}

else{
showAuthority()
}

}

function logout(){

location.reload()

}

function showUser(){

document.getElementById("userPanel").classList.remove("hidden")

document.getElementById("authorityPanel").classList.add("hidden")

displayUser()

}

function showAuthority(){

document.getElementById("authorityPanel").classList.remove("hidden")

document.getElementById("userPanel").classList.add("hidden")

displayAdmin()

}

function submitComplaint(){

let cap=document.getElementById("captchaInput").value

if(cap!=captchaCode){
alert("Wrong Captcha")
return
}

let comp={
id:Date.now(),
name:document.getElementById("name").value,
email:document.getElementById("email").value,
dept:document.getElementById("dept").value,
text:document.getElementById("complaint").value,
status:"Pending",
sla:3,
date:new Date(),
flag:false
}

complaints.push(comp)

localStorage.setItem("complaints",JSON.stringify(complaints))

alert("Complaint Submitted")

displayUser()

}

function displayUser(){

let table=""

complaints.forEach(c=>{

let esc="None"

let now=new Date()

let diff=(now-new Date(c.date))/(1000*60*60*24)

if(diff>c.sla && c.status!="Resolved"){
esc="Escalated"
}

table+=`
<tr>
<td>${c.id}</td>
<td>${c.dept}</td>
<td>${c.text}</td>
<td class="${c.status=='Resolved'?'resolved':'pending'}">${c.status}</td>
<td>${c.sla} days</td>
<td>${esc}</td>
</tr>
`

})

document.getElementById("userTable").innerHTML=table

}

function displayAdmin(){

let table=""

complaints.forEach(c=>{

table+=`
<tr>
<td>${c.id}</td>
<td>${c.name}</td>
<td>${c.dept}</td>
<td>${c.text}</td>
<td>${c.status}</td>
<td>

<button onclick="resolve(${c.id})">Resolved</button>

<button onclick="flag(${c.id})">Flag</button>

</td>

</tr>
`

})

document.getElementById("adminTable").innerHTML=table

}

function resolve(id){

complaints.forEach(c=>{
if(c.id==id){
c.status="Resolved"
}
})

localStorage.setItem("complaints",JSON.stringify(complaints))

displayAdmin()
displayUser()

}

function flag(id){

complaints.forEach(c=>{
if(c.id==id){
c.flag=true
}
})

alert("Complaint Flagged")

}

setInterval(()=>{

displayUser()

},60000)

</script>

</body>
</html>
